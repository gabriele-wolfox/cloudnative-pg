# PostgreSQL Cluster with pgvector extension for RAG workloads
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: vectordb
  namespace: llm-d
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.4-bookworm

  storage:
    size: 2Gi

  bootstrap:
    initdb:
      database: ragdb
      owner: raguser
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS vector;

  postgresql:
    parameters:
      shared_buffers: "256MB"
      max_connections: "100"
---
# Secret for the raguser (auto-generated by CNPG, but we can also create manually)
apiVersion: v1
kind: Secret
metadata:
  name: vectordb-app-credentials
  namespace: llm-d
type: kubernetes.io/basic-auth
stringData:
  username: raguser
  password: ragpassword
